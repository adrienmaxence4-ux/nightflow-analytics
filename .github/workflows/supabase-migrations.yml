name: Supabase Migrations

# Pushes the versioned SQL migrations in supabase/migrations to the linked
# Supabase project on every push to main that touches them.
#
# Configure these GitHub repository secrets to enable it
# (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN   — Personal access token (account.supabase.com/account/tokens)
#   SUPABASE_PROJECT_ID     — Project ref (Project Settings → General)
#   SUPABASE_DB_PASSWORD    — Database password (Project Settings → Database)
#
# Without these secrets the job runs but skips gracefully (stays green).

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch:

jobs:
  migrate:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "ℹ️  Secrets Supabase non configurés — étape ignorée (aucune migration poussée)."
            exit 0
          fi
          echo "🔗 Liaison au projet $SUPABASE_PROJECT_ID…"
          supabase link --project-ref "$SUPABASE_PROJECT_ID"
          echo "🚀 Application des migrations…"
          supabase db push
