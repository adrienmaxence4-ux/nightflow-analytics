name: Integration Cron

# Free alternative to Vercel Cron (which needs a Pro plan): triggers the
# integration engine's worker endpoints on a schedule. Requires two repo
# secrets: CRON_SECRET (same value as the Vercel env var) and optionally
# SITE_URL (defaults to the production domain).
on:
  schedule:
    - cron: "0 * * * *"   # hourly: full sync of every connected integration
    - cron: "*/15 * * * *" # every 15 min: process the retry queue
  workflow_dispatch: {}

concurrency:
  group: integration-cron
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SITE_URL: ${{ secrets.SITE_URL || 'https://nightflow-analytics.vercel.app' }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Process retry queue
        run: |
          curl -sS -X POST "$SITE_URL/api/integrations/jobs/process" \
            -H "Authorization: Bearer $CRON_SECRET" -w "\n%{http_code}\n"

      - name: Hourly sync
        if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
        run: |
          curl -sS -X POST "$SITE_URL/api/integrations/sync" \
            -H "Authorization: Bearer $CRON_SECRET" -w "\n%{http_code}\n"
